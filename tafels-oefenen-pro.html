<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tafels Oefenen Pro</title>

  <!-- PWA: manifest + theme color -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#E2231A" />

  <!-- Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container"> 
    <!-- WELCOME SCREEN -->
    <div id="welcomeScreen" class="screen active"> 
      <h1>🎮 TAFELS</h1> 
      <h1>OEFENEN PRO</h1> 
      <p class="subtitle">Leer de tafels op een leuke manier!</p> 

      <!-- Optionele Roblox-avatar (wordt in JS gevuld wanneer ROBLOX_USER_ID is gezet) -->
      <div id="rbxAvatarWrap" class="avatar-wrap" style="display:none"> 
        <img id="rbxAvatar" alt="Roblox avatar" /> 
      </div> 

      <div class="input-group"> 
        <label for="playerName">Wat is je naam?</label> 
        <input type="text" id="playerName" placeholder="Bijv: Daley" /> 
      </div> 

      <div class="options-row"> 
        <label class="toggle"> 
          <input type="checkbox" id="mute" /> 
          <span>Geluid uit?</span> 
        </label> 
      </div> 

      <h2 class="centered-title">Welke tafels wil je oefenen?</h2> 
      <button class="select-all-btn" onclick="selectAll()">✨ ALLES SELECTEREN ✨</button> 
      <div class="tabel-grid" id="tabelGrid"></div> 
      <div style="text-align: center; margin-top: 15px;"> 
        <button class="btn-secondary" style="width: 100%; padding: 12px;" onclick="deselectAll()" title="Alles uitschakelen">Alles uitschakelen</button> 
      </div> 

      <div class="btn-group"> 
        <button class="btn-secondary" onclick="startQuick()">⚡ KORT OEFENEN (20)</button> 
        <button class="btn-primary" onclick="startLong()">🔥 LANGER (40)</button> 
      </div> 
      <div class="btn-group"> 
        <button class="btn-primary" onclick="startSystematic()">🧩 SYSTEMATISCH (ALLE COMBI'S)</button> 
        <button id="startHardBtn" class="btn-success" onclick="startHard()" disabled>↺ LASTIGE SOMMEN</button> 
      </div> 

      <div class="message-box" style="margin-top: 20px;"> 
        <strong>💡 Tip:</strong> Kies minstens één tafel! 
      </div> 
    </div> 

    <!-- QUIZ SCREEN --> 
    <div id="quizScreen" class="screen"> 
      <div class="topbar"> 
        <div class="userline"> 
          <span id="playerNameDisplay"></span> 
          <span id="scoreDisplay" class="score-mini">📊 0 goed</span> 
        </div> 
      </div> 

      <div class="progress-bar"> 
        <div class="progress-fill" id="progressFill"></div> 
      </div> 

      <div class="question-display"> 
        <div class="question-number">Vraag <span id="questionNumber">1</span> / <span id="totalQuestions">20</span></div> 
        <div class="question" id="question">5 × 3 = ?</div> 
      </div> 

      <div class="answer-input-group"> 
        <input type="number" id="answerInput" placeholder="Typ je antwoord..." inputmode="numeric" pattern="[0-9]*" /> 
        <button id="checkBtn" class="btn-success" onclick="checkAnswer()" style="width: 100%; margin-top: 15px; padding: 15px; font-size: 1.1em;">✔ CONTROLEER</button> 
      </div> 

      <div id="feedback"></div> 
      <button class="btn-secondary" onclick="goHome()" style="width: 100%; margin-top: 20px;">← Terug naar menu</button> 
    </div> 

    <!-- RESULTS SCREEN --> 
    <div id="resultsScreen" class="screen"> 
      <h1 style="font-size: 2em;">KLAAR! 🎉</h1> 
      <div id="resultEmoji" class="emoji">😄</div> 
      <p style="font-size: 1.2em; margin: 15px 0; color: var(--accent);"> 
        Goed gedaan, <span id="resultPlayerName"></span>! 
      </p> 
      <div class="score-display" id="scoreResult">0/20</div> 

      <div class="stats"> 
        <div class="stat"> 
          <div class="stat-value" id="correctCount">0</div> 
          <div class="stat-label">Goed ✓</div> 
        </div> 
        <div class="stat"> 
          <div class="stat-value" id="incorrectCount">0</div> 
          <div class="stat-label">Fout ✗</div> 
        </div> 
        <div class="stat"> 
          <div class="stat-value" id="percentage">0%</div> 
          <div class="stat-label">Score</div> 
        </div> 
      </div> 

      <div id="tablesBreakdown" style="margin: 25px 0; text-align: left;"></div> 

      <div class="btn-group" style="flex-direction: column; gap: 10px;"> 
        <button class="btn-success" onclick="practiceWrongs()">↺ OEFEN DE FOUTEN</button> 
        <button class="btn-primary" onclick="goHome()">🏠 TERUG NAAR MENU</button> 
        <button class="btn-secondary" onclick="playAgain()">🔄 OPNIEUW OEFENEN</button> 
      </div> 
    </div> 
  </div> 

  <!-- App logic -->
  <script src="app.js" defer></script>
  <script>
    // PWA: service worker registratie
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    }
  </script>
</body>
</html>
